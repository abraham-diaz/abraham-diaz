<svg width="860" height="200" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .wave1 { animation: drift1 8s ease-in-out infinite; }
      .wave2 { animation: drift2 11s ease-in-out infinite; }
      .wave3 { animation: drift3 14s ease-in-out infinite; }
      .wave4 { animation: drift4 9s ease-in-out infinite; }
      @keyframes drift1 {
        0%, 100% { transform: translateX(0px); }
        50% { transform: translateX(-40px); }
      }
      @keyframes drift2 {
        0%, 100% { transform: translateX(0px); }
        50% { transform: translateX(30px); }
      }
      @keyframes drift3 {
        0%, 100% { transform: translateX(0px); }
        50% { transform: translateX(-25px); }
      }
      @keyframes drift4 {
        0%, 100% { transform: translateX(0px); }
        50% { transform: translateX(20px); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="#000000"/>
  <rect width="860" height="200" fill="url(#bg-grad)"/>
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#020810"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="wg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3c78" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#050a1e" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="wg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3468" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#050a1e" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="wg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162d58" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#050a1e" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="wg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2040" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#050a1e" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Wave 4 - deepest -->
  <g class="wave4">
    <path d="M-100,90 Q50,76 200,90 Q350,104 500,90 Q650,76 800,90 Q950,104 1060,90 L1060,200 L-100,200 Z"
          fill="url(#wg4)" stroke="#334d80" stroke-width="0.5" stroke-opacity="0.12"/>
  </g>

  <!-- Wave 3 -->
  <g class="wave3">
    <path d="M-100,108 Q80,92 260,108 Q440,124 620,108 Q800,92 980,108 Q1060,116 1060,108 L1060,200 L-100,200 Z"
          fill="url(#wg3)" stroke="#3a5a9a" stroke-width="0.6" stroke-opacity="0.16"/>
  </g>

  <!-- Wave 2 -->
  <g class="wave2">
    <path d="M-100,124 Q100,106 300,124 Q500,142 700,124 Q900,106 1060,124 L1060,200 L-100,200 Z"
          fill="url(#wg2)" stroke="#4070b8" stroke-width="0.7" stroke-opacity="0.2"/>
  </g>

  <!-- Wave 1 - surface -->
  <g class="wave1">
    <path d="M-100,140 Q115,120 330,140 Q545,160 760,140 Q975,120 1060,140 L1060,200 L-100,200 Z"
          fill="url(#wg1)" stroke="#507ac8" stroke-width="0.8" stroke-opacity="0.28"/>
  </g>

  <!-- Text -->
  <text x="430" y="78" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="13" font-weight="400"
        fill="#ffffff" fill-opacity="0.28" text-anchor="middle" letter-spacing="1">Hello, I'm</text>

  <text x="430" y="108" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="22" font-weight="500"
        fill="#f0f0f0" fill-opacity="0.92" text-anchor="middle">Abraham Díaz</text>

  <text x="430" y="132" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="400"
        fill="#ffffff" fill-opacity="0.28" text-anchor="middle" letter-spacing="2">&lt; full-stack developer · madrid /&gt;</text>

  <text x="430" y="158" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" font-weight="400"
        fill="#ffffff" fill-opacity="0.18" text-anchor="middle" letter-spacing="3">node.js · typescript · react · python · self-hosted</text>
</svg>
